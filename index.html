<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/film.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <title>FilmStar</title>
    <script>
    (function() {
      try {
        var saved = JSON.parse(localStorage.getItem('banner'));
        var today = new Date().toISOString().slice(0, 10);
        if (saved && saved.date === today && saved.movie && saved.movie.backdrop_path) {
          var imgUrl = "https://image.tmdb.org/t/p/w1280" + saved.movie.backdrop_path;
          
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = imgUrl;
          link.fetchPriority = 'high';
          document.head.appendChild(link);
        }
      } catch(e) {}
    })();
  </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
